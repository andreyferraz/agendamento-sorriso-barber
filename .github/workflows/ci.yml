name: CI — Build and Admin init

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build with Maven
        run: ./mvnw -B -DskipTests package

      - name: Start app to create admin user
        run: |
          nohup java -jar target/*.jar --spring.jpa.hibernate.ddl-auto=update > app.log 2>&1 &
          echo $! > app.pid
          sleep 12
          if grep -q "Started" app.log; then echo "App started"; else tail -n 200 app.log; exit 1; fi

      - name: Stop app
        run: |
          kill $(cat app.pid) || true

      - name: Run tests
        run: ./run.sh test
