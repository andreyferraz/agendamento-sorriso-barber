<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
  <head>
    <title>Serviços — Sorriso Barber</title>
  </head>
  <body th:replace="layout :: layout('Serviços', ~{::body})">
    <h2 style="font-family:'Playfair Display',serif">Nossos Serviços</h2>
    <p class="muted">Escolha o serviço ideal para seu estilo.</p>

    <div class="grid" style="margin-top:18px">
      <div class="card">
        <div class="icon">✂️</div>
        <h3>Corte Masculino</h3>
        <p>Inclui lavagem, corte e acabamento com navalha.</p>
        <div class="price">R$ 60,00</div>
      </div>

      <div class="card">
        <div class="icon">🧴</div>
        <h3>Progressiva</h3>
        <p>Tratamento e alinhamento com técnicas profissionais.</p>
        <div class="price">R$ 120,00</div>
      </div>

      <div class="card">
        <div class="icon">🪒</div>
        <h3>Barba</h3>
        <p>Modelagem, limpeza e navalha.</p>
        <div class="price">R$ 40,00</div>
      </div>
    </div>
  </body>
</html>
